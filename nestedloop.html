<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Loops</title>
</head>

<body>
    <h1>Nested Loops</h1>
    <p>A nested loop is a loop that is contained within another loop. The "inner loop" will be executed one time for
        each iteration of the "outer loop".</p>
   <script>
    for (i = 1 ; i <= 5; i++) {
        document.write( "<br>");
        for ( j = 1 ; j <=i ; j++) {
            document.write("@");
        }
    }

   </script>
</body>

</html>
