<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Table Table</title>
    
</head>
<body>

    <h1>Multiplication Table</h1>
    <p>Enter a number and click check to see the table in a responsive format.</p>

    <form>
        Enter A Number: <input type="number" id="num">
        <button type="button" onclick="keyvalue()">Check</button>
    </form>

    <div id="table-container"></div>

    <script>
    function keyvalue() {
        var n = document.getElementById("num").value;
        var container = document.getElementById("table-container");

        if (n === "") {
            container.innerHTML = "Please enter a number.";
            return;
        }

       
        var html = "<table border='1' style='width: 50%; margin: auto; text-align: center; border-collapse: collapse;'>";
        html += "<tr><th colspan='3'>Table of " + n + "</th></tr>";

        for (let i = 1; i <= 10; i++) {
            let r = n * i;
           
            html += "<tr>" + 
                        "<td>" + n + " x " + i + "</td>" + 
                        "<td>=</td>" + 
                        "<td>" + r + "</td>" + 
                    "</tr>";
        }

        html += "</table>"; 
        container.innerHTML = html;
    }
    </script>

</body>
</html>
